<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>legacyStore — Trading Card Games</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Loja de Trading Card Games: boxes, cartas avulsas e acessórios. Pokémon, Magic, Yu-Gi-Oh! e mais." />
    <meta name="theme-color" content="#1e5fd8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Aplica o tema ANTES do primeiro paint (evita flash da logo/cores erradas) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('legacystore-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <!-- Fontes: Roboto (tipografia Material) + Material Symbols (ícones) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
