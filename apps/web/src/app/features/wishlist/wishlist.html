<div class="mx-auto max-w-7xl px-4 py-8">
  <h1 class="text-2xl font-bold text-neutral-900 dark:text-white">Lista de desejos</h1>

  @if (loading()) {
    <div class="mt-6 grid grid-cols-2 gap-4 md:grid-cols-4">
      @for (i of [1,2,3,4]; track i) {
        <div class="h-72 animate-pulse rounded-2xl bg-neutral-200 dark:bg-neutral-800"></div>
      }
    </div>
  } @else if (products().length === 0) {
    <div class="mt-8 grid place-items-center rounded-2xl border border-dashed border-neutral-300 dark:border-neutral-700 py-20 text-center">
      <mat-icon class="!h-14 !w-14 !text-6xl text-neutral-300">favorite_border</mat-icon>
      <p class="mt-4 text-neutral-500">Sua lista de desejos está vazia.</p>
      <a routerLink="/produtos" mat-flat-button color="primary" class="!mt-4 !rounded-xl">Explorar produtos</a>
    </div>
  } @else {
    <div class="mt-6 grid grid-cols-2 gap-4 md:grid-cols-4">
      @for (product of products(); track product.id) {
        <app-product-card [product]="product" />
      }
    </div>
  }
</div>
