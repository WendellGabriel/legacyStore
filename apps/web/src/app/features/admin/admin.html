<div class="flex min-h-screen bg-neutral-50 dark:bg-neutral-950">
  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-40 w-64 transform border-r border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 transition-transform lg:static lg:translate-x-0"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()"
  >
    <div class="flex h-16 items-center gap-2 border-b border-neutral-200 dark:border-neutral-800 px-5">
      <img src="/brand/logo-full.png" alt="LEGACY" class="h-7 w-auto block dark:hidden" />
      <img src="/brand/logo-cyan.png" alt="LEGACY" class="h-7 w-auto hidden dark:block" />
      <span class="text-xs font-semibold uppercase tracking-wide text-neutral-400">Admin</span>
    </div>
    <nav class="space-y-1 p-3">
      @for (item of nav; track item.path) {
        <a
          [routerLink]="item.path"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          routerLinkActive="bg-brand text-white"
          (click)="sidebarOpen.set(false)"
          class="flex items-center gap-3 rounded-xl px-3 py-2 text-sm font-medium text-neutral-700 dark:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition"
        >
          <mat-icon class="!h-5 !w-5 !text-xl">{{ item.icon }}</mat-icon>
          {{ item.label }}
        </a>
      }
    </nav>
    <div class="absolute bottom-0 w-full border-t border-neutral-200 dark:border-neutral-800 p-3">
      <a routerLink="/" class="flex items-center gap-3 rounded-xl px-3 py-2 text-sm text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800">
        <mat-icon class="!h-5 !w-5 !text-xl">storefront</mat-icon> Ver a loja
      </a>
      <button (click)="signOut()" class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-950/30">
        <mat-icon class="!h-5 !w-5 !text-xl">logout</mat-icon> Sair
      </button>
    </div>
  </aside>

  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-30 bg-black/40 lg:hidden" (click)="sidebarOpen.set(false)"></div>
  }

  <!-- Conteúdo -->
  <div class="flex-1 lg:ml-0">
    <header class="sticky top-0 z-20 flex h-16 items-center gap-3 border-b border-neutral-200 dark:border-neutral-800 bg-white/90 dark:bg-neutral-900/90 backdrop-blur px-4 lg:px-6">
      <button (click)="sidebarOpen.set(!sidebarOpen())" class="lg:hidden" aria-label="Menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="text-sm text-neutral-500">Painel administrativo</span>
      <span class="ml-auto text-sm font-medium text-neutral-700 dark:text-neutral-300">{{ auth.profile()?.full_name }}</span>
    </header>
    <main class="p-4 lg:p-6">
      <router-outlet />
    </main>
  </div>
</div>
