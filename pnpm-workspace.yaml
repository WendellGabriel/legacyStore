packages:
  - "apps/*"
  - "packages/*"

# Não re-verificar dependências antes de rodar scripts (ex.: "pnpm --filter
# web build"). No CI da Vercel isso disparava um install que falhava no
# ERR_PNPM_IGNORED_BUILDS. Config vive aqui no pnpm 11 (não mais no .npmrc).
verifyDepsBeforeRun: false

# Suprime o erro de build scripts ignorados (binários vêm de deps opcionais).
ignoredBuiltDependencies:
  - "@parcel/watcher"
  - esbuild
  - lmdb
  - msgpackr-extract
